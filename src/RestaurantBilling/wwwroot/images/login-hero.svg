<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" fill="none" role="img" aria-label="Decorative Indian thali illustration">
  <defs>
    <linearGradient id="g-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="g-sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDBA74;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="g-plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="100%" style="stop-color:#8B5A2B"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="520" height="420" fill="url(#g-sky)"/>
  <circle cx="380" cy="80" r="55" fill="url(#g-sun)"/>
  <ellipse cx="260" cy="300" rx="200" ry="18" fill="#0C1222" opacity="0.35"/>
  <g filter="url(#s)">
    <ellipse cx="260" cy="255" rx="160" ry="100" fill="url(#g-plate)" transform="rotate(-4 260 255)"/>
    <ellipse cx="260" cy="250" rx="150" ry="90" fill="#1E1B16" transform="rotate(-4 260 250)"/>
    <ellipse cx="250" cy="230" rx="45" ry="32" fill="#B45309" transform="rotate(-8 250 230)"/>
    <ellipse cx="300" cy="230" rx="40" ry="30" fill="#F59E0B" transform="rotate(6 300 230)"/>
    <ellipse cx="270" cy="200" rx="35" ry="22" fill="#FEF3C7" transform="rotate(-2 270 200)"/>
    <ellipse cx="220" cy="210" rx="32" ry="25" fill="#22C55E" opacity="0.85" transform="rotate(-12 220 210)"/>
    <ellipse cx="300" cy="200" rx="30" ry="20" fill="#EF4444" opacity="0.7" transform="rotate(8 300 200)"/>
    <circle cx="200" cy="250" r="18" fill="#FBBF24"/>
    <circle cx="320" cy="255" r="16" fill="#D97706"/>
  </g>
  <g opacity="0.4" stroke="#FEF3C7" stroke-width="1.2" stroke-linecap="round">
    <path d="M180 120 Q200 100 220 120 Q240 100 260 120"/>
    <path d="M300 100 Q320 80 340 100"/>
  </g>
  <text x="260" y="380" text-anchor="middle" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="0.2em">RESTAURANT SUITE</text>
</svg>
